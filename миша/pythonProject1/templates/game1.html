<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра 1 - Приключение</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        canvas { border: 2px solid #333; background: #111; display: block; margin: 20px auto; }
        .controls { text-align: center; margin-top: 20px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
        #level { font-size: 24px; text-align: center; margin: 10px; color: gold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Приключение куба</h1>
        <div class="controls">
            <button onclick="setMode('cube')">Куб 🧊</button>
            <button onclick="setMode('plane')">Самолетик ✈️</button>
            <button onclick="setMode('arrow')">Стрела 🏹</button>
        </div>
        <div id="level">Уровень: 1 / 100</div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <button onclick="restartGame()">Перезапустить</button>
            <a href="/"><button>На главную</button></a>
        </div>
    </div>
    <script src="/static/game1.js"></script>
</body>
</html>
</body>
</html>
