<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla JS Platformer</title>
    <style>
      /* Сброс стилей и центрирование */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f0f1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: monospace;
      }
      /* Масштабирование canvas с сохранением пропорций */
      canvas {
        background: #1a1a2e;
        aspect-ratio: 800 / 450;
        width: 100vw;
        height: 100vh;
        max-width: 800px;
        max-height: 450px;
        image-rendering: pixelated; /* Чёткие пиксели при масштабировании */
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <script>
      // ========================================================================
      // 🧱 КОНСТАНТЫ И КОНФИГУРАЦИЯ
      // ========================================================================
      const CANVAS_WIDTH = 800;
      const CANVAS_HEIGHT = 450;
      const GRAVITY = 1100; // пикселей/с²
      const ACCELERATION = 2200; // разгон/торможение
      const MAX_SPEED = 320; // максимальная горизонтальная скорость
      const FRICTION = 0.88; // коэффициент трения (инерция)
      const JUMP_FORCE = -560; // сила прыжка

      // ========================================================================
      // 🎮 СОСТОЯНИЕ ИГРЫ И ВВОД
      // ========================================================================
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Установка внутреннего разрешения
      canvas.width = CANVAS_WIDTH;
      canvas.height = CANVAS_HEIGHT;

      const keys = {};
      let gameState = "start"; // 'start' | 'playing' | 'win'
      let lastTime = 0;

      // Объект игрока
      const player = {
        x: 50,
        y: 300,
        w: 30,
        h: 40,
        vx: 0,
        vy: 0,
        onGround: false,
      };

      let platforms = [];
      let coins = [];
      let finish = { x: 0, y: 0, w: 50, h: 50 };
      let collectedCount = 0;
      let totalCoins = 0;

      // ========================================================================
      // 🔄 ИНИЦИАЛИЗАЦИЯ И ОБРАБОТКА РЕСАЙЗА
      // ========================================================================
      function init() {
        setupInput();
        resetGame();
        requestAnimationFrame(gameLoop);
      }

      // Предотвращаем скролл страницы при нажатии клавиш управления
      function setupInput() {
        const preventKeys = [
          "ArrowUp",
          "ArrowDown",
          "ArrowLeft",
          "ArrowRight",
          "Space",
        ];
        window.addEventListener("keydown", (e) => {
          if (preventKeys.includes(e.code)) e.preventDefault();
          keys[e.code] = true;
          if (gameState === "start" && e.code === "Space")
            gameState = "playing";
          if (gameState === "win" && e.code === "Space") resetGame();
        });
        window.addEventListener("keyup", (e) => (keys[e.code] = false));
      }

      // ========================================================================
      // 📐 УРОВЕНЬ И СБРОС СОСТОЯНИЯ
      // ========================================================================
      function resetGame() {
        player.x = 50;
        player.y = 350;
        player.vx = 0;
        player.vy = 0;
        player.onGround = false;
        collectedCount = 0;
        gameState = "start";

        // Платформы (минимум 5, образуют лестницу)
        platforms = [
          { x: 0, y: 420, w: 200, h: 30 }, // Стартовая зона
          { x: 250, y: 360, w: 160, h: 20 }, // Платформа 1
          { x: 480, y: 290, w: 130, h: 20 }, // Платформа 2
          { x: 320, y: 210, w: 110, h: 20 }, // Платформа 3 (возврат влево)
          { x: 120, y: 140, w: 140, h: 20 }, // Платформа 4
          { x: 550, y: 160, w: 100, h: 20 }, // Платформа 5 (ближе к финишу)
          { x: 700, y: 380, w: 100, h: 70 }, // Нижний правый угол (страховка)
        ];

        // Монеты (6 штук)
        coins = [
          { x: 310, y: 320, w: 16, h: 16, collected: false },
          { x: 530, y: 250, w: 16, h: 16, collected: false },
          { x: 360, y: 170, w: 16, h: 16, collected: false },
          { x: 170, y: 100, w: 16, h: 16, collected: false },
          { x: 590, y: 120, w: 16, h: 16, collected: false },
          { x: 730, y: 340, w: 16, h: 16, collected: false },
        ];
        totalCoins = coins.length;

        // Финишная зона
        finish = { x: 60, y: 60, w: 40, h: 60 };
      }

      // ========================================================================
      // ⚙️ ФИЗИКА И КОЛЛИЗИИ (AABB, раздельная обработка осей)
      // ========================================================================
      function checkAABB(a, b) {
        // Проверка пересечения двух прямоугольников
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function resolveCollisionsX() {
        for (let p of platforms) {
          if (checkAABB(player, p)) {
            // Разрешаем коллизию по X: выталкиваем игрока наружу
            if (player.vx > 0) player.x = p.x - player.w;
            else if (player.vx < 0) player.x = p.x + p.w;
            player.vx = 0;
          }
        }
      }

      function resolveCollisionsY() {
        player.onGround = false;
        for (let p of platforms) {
          if (checkAABB(player, p)) {
            if (player.vy > 0) {
              // Падение вниз: встаём на платформу
              player.y = p.y - player.h;
              player.onGround = true;
            } else if (player.vy < 0) {
              // Прыжок вверх: ударяемся головой
              player.y = p.y + p.h;
            }
            player.vy = 0;
          }
        }
      }

      function updatePhysics(dt) {
        if (gameState !== "playing") return;

        // 1. Горизонтальное движение (инерция + ускорение)
        let dir = 0;
        if (keys["ArrowLeft"] || keys["KeyA"]) dir -= 1;
        if (keys["ArrowRight"] || keys["KeyD"]) dir += 1;

        player.vx += dir * ACCELERATION * dt;
        player.vx *= FRICTION;

        // Ограничение скорости и остановка при микродвижениях
        if (Math.abs(player.vx) > MAX_SPEED)
          player.vx = Math.sign(player.vx) * MAX_SPEED;
        if (Math.abs(player.vx) < 5) player.vx = 0;

        // 2. Прыжок
        if (
          (keys["Space"] || keys["KeyW"] || keys["ArrowUp"]) &&
          player.onGround
        ) {
          player.vy = JUMP_FORCE;
          player.onGround = false;
        }

        // 3. Гравитация
        player.vy += GRAVITY * dt;

        // 4. Применение скорости и коллизии (РАЗДЕЛЬНО по осям!)
        // Это предотвращает "залипание" на углах платформ
        player.x += player.vx * dt;
        resolveCollisionsX();

        player.y += player.vy * dt;
        resolveCollisionsY();

        // Границы экрана
        if (player.x < 0) {
          player.x = 0;
          player.vx = 0;
        }
        if (player.x + player.w > CANVAS_WIDTH) {
          player.x = CANVAS_WIDTH - player.w;
          player.vx = 0;
        }

        // Падение в пропасть -> сброс на старт
        if (player.y > CANVAS_HEIGHT + 50) {
          player.x = 50;
          player.y = 350;
          player.vx = 0;
          player.vy = 0;
        }

        // Сбор монет
        for (let c of coins) {
          if (!c.collected && checkAABB(player, c)) {
            c.collected = true;
            collectedCount++;
          }
        }

        // Проверка победы
        if (collectedCount === totalCoins && checkAABB(player, finish)) {
          gameState = "win";
        }
      }

      // ========================================================================
      // 🖼️ РЕНДЕРИНГ
      // ========================================================================
      function render() {
        // Очистка
        ctx.fillStyle = "#161625";
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Фоновая сетка (декор)
        ctx.strokeStyle = "#2a2a40";
        ctx.lineWidth = 1;
        for (let i = 0; i < CANVAS_WIDTH; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, CANVAS_HEIGHT);
          ctx.stroke();
        }
        for (let i = 0; i < CANVAS_HEIGHT; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(CANVAS_WIDTH, i);
          ctx.stroke();
        }

        // Платформы
        ctx.fillStyle = "#4a4e69";
        ctx.strokeStyle = "#6c708f";
        ctx.lineWidth = 2;
        for (let p of platforms) {
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeRect(p.x, p.y, p.w, p.h);
        }

        // Монеты
        ctx.fillStyle = "#f1c40f";
        for (let c of coins) {
          if (!c.collected) {
            ctx.beginPath();
            ctx.arc(c.x + c.w / 2, c.y + c.h / 2, c.w / 2, 0, Math.PI * 2);
            ctx.fill();
            // Блик
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(c.x + c.w / 2 - 2, c.y + c.h / 2 - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#f1c40f";
          }
        }

        // Финишная зона
        ctx.fillStyle = collectedCount === totalCoins ? "#2ecc71" : "#555";
        ctx.fillRect(finish.x, finish.y, finish.w, finish.h);
        ctx.fillStyle = "#fff";
        ctx.font = "12px monospace";
        ctx.textAlign = "center";
        ctx.fillText(
          collectedCount === totalCoins ? "🚪" : "🔒",
          finish.x + finish.w / 2,
          finish.y + finish.h / 2 + 5,
        );
        ctx.textAlign = "left";

        // Игрок
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // Глаза (направление взгляда)
        const lookDir = player.vx >= 0 ? 1 : -1;
        ctx.fillStyle = "#fff";
        ctx.fillRect(player.x + (lookDir > 0 ? 18 : 4), player.y + 10, 8, 8);
        ctx.fillStyle = "#000";
        ctx.fillRect(player.x + (lookDir > 0 ? 20 : 6), player.y + 12, 4, 4);

        // HUD
        ctx.fillStyle = "#fff";
        ctx.font = "16px monospace";
        ctx.fillText(`💎 ${collectedCount} / ${totalCoins}`, 15, 25);

        // Экран старта
        if (gameState === "start") {
          ctx.fillStyle = "rgba(15, 15, 26, 0.85)";
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.fillStyle = "#e74c3c";
          ctx.font = "bold 36px monospace";
          ctx.textAlign = "center";
          ctx.fillText("ПЛАТФОРМЕР", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 50);
          ctx.fillStyle = "#ccc";
          ctx.font = "18px monospace";
          ctx.fillText(
            "← → / A D  :  Движение",
            CANVAS_WIDTH / 2,
            CANVAS_HEIGHT / 2,
          );
          ctx.fillText(
            "Пробел / W / ↑  :  Прыжок",
            CANVAS_WIDTH / 2,
            CANVAS_HEIGHT / 2 + 30,
          );
          ctx.fillStyle = "#f1c40f";
          ctx.font = "20px monospace";
          ctx.fillText(
            "[ Нажмите ПРОБЕЛ ]",
            CANVAS_WIDTH / 2,
            CANVAS_HEIGHT / 2 + 80,
          );
          ctx.textAlign = "left";
        }

        // Экран победы
        if (gameState === "win") {
          ctx.fillStyle = "rgba(15, 15, 26, 0.9)";
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.fillStyle = "#2ecc71";
          ctx.font = "bold 40px monospace";
          ctx.textAlign = "center";
          ctx.fillText("ПОБЕДА!", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
          ctx.fillStyle = "#fff";
          ctx.font = "18px monospace";
          ctx.fillText(
            "Все монеты собраны 🎉",
            CANVAS_WIDTH / 2,
            CANVAS_HEIGHT / 2 + 20,
          );
          ctx.fillStyle = "#aaa";
          ctx.fillText(
            "[ ПРОБЕЛ : Играть снова ]",
            CANVAS_WIDTH / 2,
            CANVAS_HEIGHT / 2 + 60,
          );
          ctx.textAlign = "left";
        }
      }

      // ========================================================================
      // ⏱️ ИГРОВОЙ ЦИКЛ
      // ========================================================================
      function gameLoop(timestamp) {
        // Расчет delta time (в секундах) с защитой от скачков (таб не в фокусе)
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.05) dt = 0.05;

        // Порядок этапов: 1. Физика/Ввод -> 2. Рендер
        updatePhysics(dt);
        render();

        requestAnimationFrame(gameLoop);
      }

      // Запуск
      init();
    </script>
  </body>
</html>
